name: Update Tournament Tables
on:
  schedule:
    # Запуск каждый день ровно в 09:00 по времени в Германии (07:00 по UTC)
    - cron: '0 7 * * *'
  workflow_dispatch: # Включает кнопку ручного запуска в интерфейсе
jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        # Устанавливаем axios и cheerio, которые необходимы для работы index.js
        run: npm install axios cheerio
      - name: Run update script
        run: node index.js
