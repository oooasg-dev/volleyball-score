<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Score v4.1.1</title>
  
  <!-- Вот они, твои иконки и настройки для домашнего экрана! -->
  <link rel="apple-touch-icon" href="https://i.ibb.co/Z6Hcnvf9/image.png">
  <link rel="shortcut icon" href="https://i.ibb.co/Z6Hcnvf9/image.png" type="image/png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Score Web">

  
  <style>
    body { font-family: Arial, sans-serif; background: #d4ebd5; text-align: center; margin: 0; padding: 8px; color: #333; touch-action: manipulation; -webkit-user-select: none; user-select: none; }
    .phone-wrapper { max-width: 420px; margin: 0 auto; }
    .main-table { background: #b0bec5; border: 3px solid #37474f; border-radius: 8px; padding: 6px; width: 100%; box-sizing: border-box; box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
    .header-row { display: grid; grid-template-columns: 1.2fr 0.8fr 1.2fr; background: #2e7d32; color: white; padding: 8px 4px; font-weight: bold; font-size: 1rem; border-radius: 4px; align-items: center; margin-bottom: 8px; }
    .team-block { display: flex; align-items: center; justify-content: center; gap: 4px; overflow: hidden; }
    .team-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 90px; }
    .btn-edit { background: none; border: none; color: #fff; cursor: pointer; font-size: 0.85rem; padding: 2px; opacity: 0.7; }
    .satz-title { background: #fff; color: #333; padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; display: inline-block;}
    .stat-row { display: grid; grid-template-columns: 1fr 45px 120px 45px 1fr; align-items: center; background: #eceff1; padding: 4px; margin: 6px 0; border-radius: 4px; gap: 4px; }
    .btn-action { height: 50px; font-size: 1.4rem; font-weight: bold; color: white; border: none; border-radius: 6px; cursor: pointer; padding: 0; width: 100%; }
    button:active { transform: scale(0.95); }
    .btn-plus { background-color: #1976d2; }  
    .val-cell { font-size: 1.2rem; font-weight: bold; color: #1e293b; text-align: center; background: #ffffff; padding: 12px 0; border-radius: 4px; border: 1px solid #b0bec5; }
    .label-cell { background: #cfd8dc; font-weight: bold; font-size: 0.85rem; color: #37474f; padding: 14px 0; border-radius: 4px; border: 1px solid #b0bec5; text-align: center; text-transform: uppercase; }
    .punkte-row { display: flex; align-items: center; justify-content: space-between; background: #cfd8dc; font-weight: bold; border: 2px solid #78909c; margin: 8px 0; border-radius: 4px; padding: 4px; }
    .punkte-label { width: 120px; background: #fff; font-size: 1.1rem; padding: 10px 0; text-transform: uppercase; border-radius: 4px; border: 1px solid #b0bec5; cursor: pointer; transition: background 0.2s; }
    .punkte-label:active { background: #bbb; }
    .punkte-val { width: 125px; font-size: 2.2rem; color: #1565c0; font-weight: bold; text-align: center; position: relative;}
    .serving-dot { position: absolute; top: 4px; font-size: 0.8rem; color: #2e7d32; display: none; }
    .serve-left { left: 12px; } .serve-right { right: 12px; }
    
    /* СТИЛИ ДЛЯ АВТОМАТИЧЕСКИХ СЕТОВ И ТАЙМ-АУТОВ */
    .satz-row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
    .control-btn-block { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 125px; }
    .btn-satz-inc { background-color: #2e7d32; height: 32px; font-size: 0.9rem; width: 100%; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; }
    .btn-timeout { background-color: #78909c; height: 35px; font-size: 1.1rem; width: 100%; border: none; border-radius: 4px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.3s; }
    .btn-timeout.active { background-color: #f57c00 !important; animation: blink 1s infinite; }
    .timeout-dots { display: flex; gap: 6px; justify-content: center; margin-top: 2px; }
    .t-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid #546e7a; background-color: #ffffff; transition: background 0.3s; }
    .t-dot.used { background-color: #78909c; border-color: #37474f; }
    
    .satz-val { background: #cfd8dc; font-size: 1.3rem; font-weight: bold; padding: 6px 0; border-radius: 4px; border: 1px solid #78909c; width: 45px; display: flex; align-items: center; justify-content: center; height: 34px; box-sizing: border-box; }
    .history-cell { background: #fff; font-size: 0.85rem; font-weight: bold; padding: 8px 2px; border-radius: 4px; border: 1px solid #78909c; color: #555; width: 120px; min-height: 18px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; justify-content: center; height: 34px; box-sizing: border-box; }
    
    .timeline-container { background: #eceff1; border: 2px solid #78909c; border-radius: 6px; margin: 10px 0; padding: 6px; }
    .timeline-title { font-size: 0.8rem; font-weight: bold; color: #37474f; text-transform: uppercase; margin-bottom: 4px; }
    .timeline-grid { display: grid; grid-template-columns: repeat(11, 1fr); gap: 2px; margin-top: 3px; }
    .dot-cell { background: #ffffff; border: 1px solid #b0bec5; height: 18px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; color: #2e7d32; }
    .control-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; width: 100%; margin-top: 8px; }
    .btn-reset { color: white; height: 46px; font-size: 0.95rem; font-weight: bold; text-transform: uppercase; border: none; border-radius: 4px; cursor: pointer; }
    .btn-undo { background-color: #607d8b; grid-column: span 2; height: 44px; font-size: 1rem;}

    /* MODAL WINDOW STYLES */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #fff; padding: 166px; padding: 16px; border-radius: 8px; width: 90%; max-width: 360px; box-sizing: border-box; text-align: left; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .modal-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 12px; color: #2e7d32; text-align: center; border-bottom: 2px solid #2e7d32; padding-bottom: 6px;}
    .modal-field { margin-bottom: 12px; }
    .modal-field label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 4px; color: #555; }
    .modal-field select, .modal-field input { width: 100%; height: 40px; border: 1px solid #b0bec5; border-radius: 4px; padding: 0 8px; box-sizing: border-box; font-size: 1rem; background: #fff; }
    .modal-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
    .btn-modal { height: 40px; font-size: 1rem; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; }
    .btn-modal-save { background: #2e7d32; color: #fff; }
    .btn-modal-close { background: #78909c; color: #fff; }
    .toggle-input-mode { font-size: 0.8rem; color: #1976d2; cursor: pointer; text-decoration: underline; text-align: center; margin-top: 8px; display: block; }

    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
  </style>
</head>
<body>

<div class="phone-wrapper">
  <div class="main-table">
    <div class="header-row">
      <div class="team-block"><span id="t1_name" class="team-title">Team A</span><button class="btn-edit" onclick="openTeamModal(1)">📝</button></div>
      <div><span class="satz-title" id="current_set_label">SATZ 1</span></div>
      <div class="team-block"><span id="t2_name" class="team-title">Team B</span><button class="btn-edit" onclick="openTeamModal(2)">📝</button></div>
    </div>
    <div class="stat-row"><button class="btn-action btn-plus" onclick="clickPlus('ang1', 1)">+1</button><div id="v_ang1" class="val-cell">0</div><div class="label-cell">Angriff</div><div id="v_ang2" class="val-cell">0</div><button class="btn-action btn-plus" onclick="clickPlus('ang2', 2)">+1</button></div>
    <div class="stat-row"><button class="btn-action btn-plus" onclick="clickPlus('blk1', 1)">+1</button><div id="v_blk1" class="val-cell">0</div><div class="label-cell">Block</div><div id="v_blk2" class="val-cell">0</div><button class="btn-action btn-plus" onclick="clickPlus('blk2', 2)">+1</button></div>
    <div class="stat-row"><button class="btn-action btn-plus" onclick="clickPlus('ase1', 1)">+1</button><div id="v_ase1" class="val-cell">0</div><div class="label-cell">Asse</div><div id="v_ase2" class="val-cell">0</div><button class="btn-action btn-plus" onclick="clickPlus('ase2', 2)">+1</button></div>
    <div class="stat-row"><button class="btn-action btn-plus" onclick="clickPlus('fhl1', 2)">+1</button><div id="v_fhl1" class="val-cell">0</div><div class="label-cell">Fehler</div><div id="v_fhl2" class="val-cell">0</div><button class="btn-action btn-plus" onclick="clickPlus('fhl2', 1)">+1</button></div>
    
    <div class="punkte-row">
      <div class="punkte-val"><span class="serving-dot serve-left" id="serve1">●</span><span id="v_pts1">0</span></div>
      <div class="label-cell punkte-label" onclick="manualSwapServe()">Punkte</div>
      <div class="punkte-val"><span id="v_pts2">0</span><span class="serving-dot serve-right" id="serve2">●</span></div>
    </div>
    
    <div class="satz-row">
      <!-- CONTROL HEIM -->
      <div class="control-btn-block">
        <button class="btn-timeout" id="btn_to1" onclick="triggerTimeout(1)">⏱️</button>
        <div class="timeout-dots" id="dots_to1">
          <div class="t-dot" id="t1_d1"></div>
          <div class="t-dot" id="t1_d2"></div>
        </div>
        <button class="btn-satz-inc" onclick="changeSetScore(1, 1)">+1 Satz</button>
      </div>
      
      <div id="v_set1" class="satz-val">0</div>
      <div id="v_history" class="history-cell">—</div>
      <div id="v_set2" class="satz-val">0</div>
      
      <!-- CONTROL GAST -->
      <div class="control-btn-block">
        <button class="btn-timeout" id="btn_to2" onclick="triggerTimeout(2)">⏱️</button>
        <div class="timeout-dots" id="dots_to2">
          <div class="t-dot" id="t2_d1"></div>
          <div class="t-dot" id="t2_d2"></div>
        </div>
        <button class="btn-satz-inc" onclick="changeSetScore(2, 1)">+1 Satz</button>
      </div>
    </div>
    
    <div class="timeline-container"><div class="timeline-title">Spielverlauf</div><div class="timeline-grid" id="row21_container"></div><div class="timeline-grid" id="row22_container" style="margin-top: 4px;"></div></div>
  </div>
  <div class="control-panel">
    <button class="btn-reset btn-undo" onclick="undoAction()">↩ Rückgängig</button>
    <button class="btn-reset" style="background-color: #78909c;" onclick="resetCurrentSet()">Reset Set</button>
    <button class="btn-reset" style="background-color: #b71c1c;" onclick="resetAllMatch()">Full Reset</button>
  </div>
</div>

<!-- MODAL TEAMAUSWAHL -->
<div class="modal-overlay" id="teamModal">
  <div class="modal-content">
    <div class="modal-title" id="modalTitle">Teamauswahl</div>
    
    <div id="dbSelectBlock">
      <div class="modal-field">
        <label>Liga auswählen:</label>
        <select id="modalLeagueSelect" onchange="onModalLeagueChange()"></select>
      </div>
      <div class="modal-field">
        <label>Team auswählen:</label>
        <select id="modalTeamSelect"></select>
      </div>
    </div>

    <div id="manualInputBlock" style="display: none;">
      <div class="modal-field">
        <label>Teamname (manuell):</label>
        <input type="text" id="modalManualInput" placeholder="Name eingeben...">
      </div>
    </div>

    <span class="toggle-input-mode" id="toggleModeBtn" onclick="toggleInputMode()">Auf manuelle Eingabe wechseln</span>

    <div class="modal-buttons">
      <button class="btn-modal btn-modal-close" onclick="closeTeamModal()">Abbrechen</button>
      <button class="btn-modal btn-modal-save" onclick="saveTeamModalSelection()">Speichern</button>
    </div>
  </div>
</div>

<script>
  const FIREBASE_BASE_URL = "https://volley-stats-14e43-default-rtdb.firebaseio.com";
  const FIREBASE_URL = `${FIREBASE_BASE_URL}/match.json`;
  const VMIX_URL = `${FIREBASE_BASE_URL}/vmix.json`;

  // Добавили в состояние учет тайм-аутов (осталось) и их текущую активность
  let state = { 
    team1Name: "Team A", team2Name: "Team B", team1Logo: "", team2Logo: "", leagueId: "", 
    ang1: 0, ang2: 0, blk1: 0, blk2: 0, ase1: 0, ase2: 0, fhl1: 0, fhl2: 0, 
    pts1: 0, pts2: 0, set1: 0, set2: 0, currentSet: 1, historyStr: "—", serve: 0, timeline: [], 
    finalSetPts1: 0, finalSetPts2: 0,
    timeoutsLeft1: 2, timeoutsLeft2: 2, timeoutActive1: false, timeoutActive2: false
  };
  let historyStack = [];
  let isSyncing = false;
  let timeoutTimers = { 1: null, 2: null };

  let dbTournamentData = null;
  let dbTeamsDictionary = null;
  let dbLeaguesDictionary = null; 
  let currentEditingTeamNum = 1; 
  let isManualModeActive = false;

  function cleanFirebaseKey(name) {
    return name.replace(/[\.\$\#\[\]\/]/g, '_').trim();
  }

  function loadDatabaseStructures() {
    fetch(`${FIREBASE_BASE_URL}/tournament.json`).then(res => res.json()).then(data => { dbTournamentData = data; });
    fetch(`${FIREBASE_BASE_URL}/teams_dictionary.json`).then(res => res.json()).then(data => { dbTeamsDictionary = data; });
    fetch(`${FIREBASE_BASE_URL}/leagues_dictionary.json`).then(res => res.json()).then(data => { dbLeaguesDictionary = data; });
  }

  function openTeamModal(teamNum) {
    currentEditingTeamNum = teamNum;
    isManualModeActive = false;
    document.getElementById('modalTitle').innerText = (teamNum === 1) ? "Heimteam (1)" : "Auswärtsteam (2)";
    document.getElementById('dbSelectBlock').style.display = "block";
    document.getElementById('manualInputBlock').style.display = "none";
    document.getElementById('toggleModeBtn').innerText = "Auf manuelle Eingabe wechseln";
    document.getElementById('modalManualInput').value = (teamNum === 1) ? state.team1Name : state.team2Name;

    const leagueSelect = document.getElementById('modalLeagueSelect');
    leagueSelect.innerHTML = '<option value="">-- Liga wählen --</option>';

    if (dbTournamentData) {
      Object.keys(dbTournamentData).forEach(leagueId => {
        let opt = document.createElement('option');
        opt.value = leagueId;
        if (dbLeaguesDictionary && dbLeaguesDictionary[leagueId]) {
          opt.innerText = dbLeaguesDictionary[leagueId].shortName || leagueId;
        } else {
          opt.innerText = leagueId.toUpperCase().replace(/_/g, ' ');
        }
        leagueSelect.appendChild(opt);
      });
    }
    document.getElementById('modalTeamSelect').innerHTML = '<option value="">-- Zuerst Liga wählen --</option>';
    document.getElementById('teamModal').style.display = "flex";
  }

  function onModalLeagueChange() {
    const leagueId = document.getElementById('modalLeagueSelect').value;
    const teamSelect = document.getElementById('modalTeamSelect');
    teamSelect.innerHTML = '<option value="">-- Team wählen --</option>';

    if (leagueId && dbTournamentData && dbTournamentData[leagueId] && dbTournamentData[leagueId].standings) {
      dbTournamentData[leagueId].standings.forEach(team => {
        let opt = document.createElement('option');
        opt.value = team.teamName;
        opt.innerText = team.teamName;
        teamSelect.appendChild(opt);
      });
    }
  }

  function toggleInputMode() {
    isManualModeActive = !isManualModeActive;
    if (isManualModeActive) {
      document.getElementById('dbSelectBlock').style.display = "none";
      document.getElementById('manualInputBlock').style.display = "block";
      document.getElementById('toggleModeBtn').innerText = "Auf Auswahllisten wechseln";
    } else {
      document.getElementById('dbSelectBlock').style.display = "block";
      document.getElementById('manualInputBlock').style.display = "none";
      document.getElementById('toggleModeBtn').innerText = "Auf manuelle Eingabe wechseln";
    }
  }

  function closeTeamModal() {
    document.getElementById('teamModal').style.display = "none";
  }

  function saveTeamModalSelection() {
    saveHistory();
    let finalName = "";
    let finalLogo = "";

    if (isManualModeActive) {
      finalName = document.getElementById('modalManualInput').value.trim();
      state.leagueId = ""; 
    } else {
      const selectedTeamRaw = document.getElementById('modalTeamSelect').value;
      if (!selectedTeamRaw) {
        alert("Bitte wählen Sie ein Team aus.");
        return;
      }
      finalName = selectedTeamRaw;
      const leagueSelect = document.getElementById('modalLeagueSelect');
      if (leagueSelect && leagueSelect.value) {
        state.leagueId = leagueSelect.value;
      }
      const safeKey = cleanFirebaseKey(selectedTeamRaw);
      if (dbTeamsDictionary && dbTeamsDictionary[safeKey]) {
        if (dbTeamsDictionary[safeKey].shortName) finalName = dbTeamsDictionary[safeKey].shortName;
        if (dbTeamsDictionary[safeKey].logo) finalLogo = dbTeamsDictionary[safeKey].logo;
      }
    }

    if (finalName) {
      if (currentEditingTeamNum === 1) {
        state.team1Name = finalName;
        state.team1Logo = finalLogo;
      } else {
        state.team2Name = finalName;
        state.team2Logo = finalLogo;
      }
      updateUI();
      sendToFirebase();
    }
    closeTeamModal();
  }

  function saveHistory() { historyStack.push(JSON.stringify(state)); if (historyStack.length > 20) historyStack.shift(); }
  
  function manualSwapServe() {
    saveHistory();
    state.serve = (state.serve === 1) ? 2 : 1;
    state.manualMode = true; 
    updateUI();
    sendToFirebase();
    fetch(`${FIREBASE_BASE_URL}/manual_serve.json`, { method: "PUT", body: JSON.stringify({active: true}) });
    setTimeout(() => { 
        delete state.manualMode; 
        sendToFirebase(); 
        fetch(`${FIREBASE_BASE_URL}/manual_serve.json`, { method: "PUT", body: JSON.stringify({active: false}) });
    }, 2000);
  }

  // Логика вызова тайм-аута (Auszeit)
  function triggerTimeout(teamNum) {
    // Если тайм-аут уже активен — повторное нажатие выключает его досрочно
    if (state[`timeoutActive${teamNum}`]) {
      saveHistory();
      state[`timeoutActive${teamNum}`] = false;
      if (timeoutTimers[teamNum]) clearTimeout(timeoutTimers[teamNum]);
      updateUI();
      sendToFirebase();
      return;
    }

    // Проверяем, остались ли доступные тайм-ауты
    if (state[`timeoutsLeft${teamNum}`] <= 0) {
      alert("Keine Auszeiten mehr übrig in diesem Satz!");
      return;
    }

    saveHistory();
    state[`timeoutsLeft${teamNum}`]--;
    state[`timeoutActive${teamNum}`] = true;
    updateUI();
    sendToFirebase();

    // Автоматическое выключение тайм-аута через 30 секунд
    if (timeoutTimers[teamNum]) clearTimeout(timeoutTimers[teamNum]);
    timeoutTimers[teamNum] = setTimeout(() => {
      state[`timeoutActive${teamNum}`] = false;
      updateUI();
      sendToFirebase();
    }, 30000);
  }

  function createTimelineCells() { 
    const r21 = document.getElementById('row21_container'); 
    const r22 = document.getElementById('row22_container'); 
    r21.innerHTML=''; r22.innerHTML=''; 
    for (let i = 0; i < 11; i++) {
      r21.innerHTML += `<div class="dot-cell" id="c_21_${i}"></div>`; 
      r22.innerHTML += `<div class="dot-cell" id="c_22_${i}"></div>`; 
    } 
  }
  
  function updateUI() {
    if (!state) return; 
    document.getElementById('t1_name').innerText = state.team1Name || "Team A";
    document.getElementById('t2_name').innerText = state.team2Name || "Team B";
    document.getElementById('v_ang1').innerText = state.ang1 || 0;
    document.getElementById('v_ang2').innerText = state.ang2 || 0;
    document.getElementById('v_blk1').innerText = state.blk1 || 0;
    document.getElementById('v_blk2').innerText = state.blk2 || 0;
    document.getElementById('v_ase1').innerText = state.ase1 || 0;
    document.getElementById('v_ase2').innerText = state.ase2 || 0;
    document.getElementById('v_fhl1').innerText = state.fhl1 || 0;
    document.getElementById('v_fhl2').innerText = state.fhl2 || 0;
    document.getElementById('v_pts1').innerText = state.pts1 || 0;
    document.getElementById('v_pts2').innerText = state.pts2 || 0;
    document.getElementById('v_set1').innerText = state.set1 || 0;
    document.getElementById('v_set2').innerText = state.set2 || 0;
    document.getElementById('v_history').innerText = state.historyStr || "—";
    document.getElementById('current_set_label').innerText = "SATZ " + (state.currentSet || 1);
    document.getElementById('serve1').style.display = state.serve === 1 ? 'block' : 'none';
    document.getElementById('serve2').style.display = state.serve === 2 ? 'block' : 'none';
    
    // Обновление подсветки кнопок Auszeit
    const btnTo1 = document.getElementById('btn_to1');
    const btnTo2 = document.getElementById('btn_to2');
    if (state.timeoutActive1) btnTo1.classList.add('active'); else btnTo1.classList.remove('active');
    if (state.timeoutActive2) btnTo2.classList.add('active'); else btnTo2.classList.remove('active');

    // Обновление белых/серых точек тайм-аутов на экране пульта
    let left1 = state.timeoutsLeft1 !== undefined ? state.timeoutsLeft1 : 2;
    let left2 = state.timeoutsLeft2 !== undefined ? state.timeoutsLeft2 : 2;
    
    document.getElementById('t1_d1').className = left1 < 2 ? 't-dot used' : 't-dot';
    document.getElementById('t1_d2').className = left1 < 1 ? 't-dot used' : 't-dot';
    document.getElementById('t2_d1').className = left2 < 2 ? 't-dot used' : 't-dot';
    document.getElementById('t2_d2').className = left2 < 1 ? 't-dot used' : 't-dot';

    let lastPoints = (state.timeline || []).slice(-11).reverse();
    for (let i = 0; i < 11; i++) {
      let cellA = document.getElementById(`c_21_${i}`);
      let cellB = document.getElementById(`c_22_${i}`);
      if (cellA && cellB) {
        cellA.innerText = lastPoints[i] === 1 ? '●' : '';
        cellB.innerText = lastPoints[i] === 2 ? '●' : '';
      }
    }
  }

  function getBallStatus() {
    if (state.set1 >= 3 || state.set2 >= 3) return { sb1: false, mb1: false, sb2: false, mb2: false };
    let target = state.currentSet === 5 ? 15 : 25;
    let status = { sb1: false, mb1: false, sb2: false, mb2: false };
    if (state.pts1 >= target - 1 && state.pts1 > state.pts2) {
      if (state.set1 === 2) status.mb1 = true; else status.sb1 = true;
    }
    if (state.pts2 >= target - 1 && state.pts2 > state.pts1) {
      if (state.set2 === 2) status.mb2 = true; else status.sb2 = true;
    }
    return status;
  }

  function syncFromFirebase() {
    if (isSyncing) return;
    fetch(FIREBASE_URL).then(res => res.json()).then(data => { if (data) { 
      const l1 = state.team1Logo; const l2 = state.team2Logo; const lid = state.leagueId;
      state = data; 
      if(!state.team1Logo) state.team1Logo = l1;
      if(!state.team2Logo) state.team2Logo = l2;
      if(!state.leagueId) state.leagueId = lid;
      if(state.timeoutsLeft1 === undefined) state.timeoutsLeft1 = 2;
      if(state.timeoutsLeft2 === undefined) state.timeoutsLeft2 = 2;
      updateUI(); 
    } });
  }
  setInterval(syncFromFirebase, 2000);

  async function sendToFirebase() {
    isSyncing = true;
    let lastPoints = (state.timeline || []).slice(-11).reverse();
    
    let ballStatus = getBallStatus();
    let activeBall = "";
    if (ballStatus.mb1) activeBall = "Matchball1";
    else if (ballStatus.mb2) activeBall = "Matchball2";
    else if (ballStatus.sb1) activeBall = "Satzball1";
    else if (ballStatus.sb2) activeBall = "Satzball2";

    let lFull = ""; let lShort = ""; let lMicro = "";
    if (state.leagueId && dbLeaguesDictionary && dbLeaguesDictionary[state.leagueId]) {
      lFull = dbLeaguesDictionary[state.leagueId].fullName || "";
      lShort = dbLeaguesDictionary[state.leagueId].shortName || "";
      lMicro = dbLeaguesDictionary[state.leagueId].microName || "";
    } else if (state.leagueId) {
      lShort = state.leagueId.toUpperCase().replace(/_/g, ' ');
    }
    
    let vmixData = { 
      pts1: state.pts1, pts2: state.pts2, set1: state.set1, set2: state.set2, 
      ang1: state.ang1, ang2: state.ang2, blk1: state.blk1, blk2: state.blk2, 
      ase1: state.ase1, ase2: state.ase2, fhl1: state.fhl1, fhl2: state.fhl2, 
      team1Name: state.team1Name, team2Name: state.team2Name, 
      team1Logo: state.team1Logo || "", team2Logo: state.team2Logo || "",
      league_full: lFull, league_short: lShort, league_micro: lMicro, league: lShort, 

      // НОВЫЕ ПЕРЕМЕННЫЕ ДЛЯ vMIX (Активность тайм-аута и сколько осталось)
      auszeit_active1: state.timeoutActive1 ? "1" : "0",
      auszeit_active2: state.timeoutActive2 ? "1" : "0",
      auszeit_left1: state.timeoutsLeft1 !== undefined ? state.timeoutsLeft1 : 2,
      auszeit_left2: state.timeoutsLeft2 !== undefined ? state.timeoutsLeft2 : 2,

      historyStr: state.historyStr,
      lastFinishedSet: (state.currentSet - 1),
      serve1: state.serve === 1 ? "●" : "", serve2: state.serve === 2 ? "●" : "",
      finalSetPts1: state.finalSetPts1 || 0, finalSetPts2: state.finalSetPts2 || 0,
      activeBallType: activeBall
    };
    for (let i = 0; i < 11; i++) {
      vmixData[`dot_21_${i+1}`] = lastPoints[i] === 1 ? "●" : ""; 
      vmixData[`dot_22_${i+1}`] = lastPoints[i] === 2 ? "●" : ""; 
    }
    await fetch(FIREBASE_URL, { method: "PUT", body: JSON.stringify(state) });
    await fetch(VMIX_URL, { method: "PUT", body: JSON.stringify([vmixData]) });
    isSyncing = false;
  }

  function clickPlus(statField, team) { 
    saveHistory(); 
    state[statField]++; 
    team === 1 ? state.pts1++ : state.pts2++ ; 
    state.serve = team; 
    if (!state.timeline) state.timeline = [];
    state.timeline.push(team); 
    checkSetEngine(); 
    updateUI(); 
    sendToFirebase(); 
  }
  
  function checkSetEngine() { 
    let target = state.currentSet === 5 ? 15 : 25; 
    if ((state.pts1 >= target && (state.pts1 - state.pts2) >= 2) || (state.pts2 >= target && (state.pts2 - state.pts1) >= 2)) { 
      state.finalSetPts1 = state.pts1; state.finalSetPts2 = state.pts2;
      state.historyStr = (state.historyStr === "—" ? "" : state.historyStr + ", ") + `${state.pts1}:${state.pts2}`; 
      state.pts1 > state.pts2 ? state.set1++ : state.set2++; 
      
      if (state.set1 < 3 && state.set2 < 3) {
        state.currentSet++; 
        state.pts1 = 0; state.pts2 = 0; state.timeline = []; 
        // Автоматический сброс тайм-аутов при переходе в новую партию!
        state.timeoutsLeft1 = 2; state.timeoutsLeft2 = 2;
        state.timeoutActive1 = false; state.timeoutActive2 = false;
      }
    } 
  }
  
  function changeSetScore(t, v) { 
    saveHistory(); 
    t === 1 ? state.set1 = Math.max(0, state.set1 + v) : state.set2 = Math.max(0, state.set2 + v); 
    updateUI(); 
    sendToFirebase(); 
  }
  
  function undoAction() { 
    if (historyStack.length > 0) { 
      state = JSON.parse(historyStack.pop()); 
      updateUI(); 
      state.isUndo = true; 
      sendToFirebase(); 
      setTimeout(() => { delete state.isUndo; sendToFirebase(); }, 3000); 
    } 
  }
  
  function resetCurrentSet() { 
    if (confirm("Satz zurücksetzen?")) { 
      saveHistory(); 
      state.ang1 = 0; state.ang2 = 0; state.blk1 = 0; state.blk2 = 0; state.ase1 = 0; state.ase2 = 0; state.fhl1 = 0; state.fhl2 = 0; 
      state.pts1 = 0; state.pts2 = 0; state.timeline = []; state.finalSetPts1 = 0; state.finalSetPts2 = 0;
      // При сбросе сета возвращаем тайм-ауты этой партии обратно
      state.timeoutsLeft1 = 2; state.timeoutsLeft2 = 2;
      state.timeoutActive1 = false; state.timeoutActive2 = false;
      updateUI(); 
      sendToFirebase();
    } 
  }
  
  function resetAllMatch() { 
    if (confirm("Alles komplett zurücksetzen?")) { 
      state = { 
        team1Name: state.team1Name, team2Name: state.team2Name, team1Logo: state.team1Logo || "", team2Logo: state.team2Logo || "", leagueId: state.leagueId || "",
        ang1: 0, ang2: 0, blk1: 0, blk2: 0, ase1: 0, ase2: 0, fhl1: 0, fhl2: 0, pts1: 0, pts2: 0, set1: 0, set2: 0, currentSet: 1, historyStr: "—", serve: 0, timeline: [], finalSetPts1: 0, finalSetPts2: 0,
        timeoutsLeft1: 2, timeoutsLeft2: 2, timeoutActive1: false, timeoutActive2: false
      };
      historyStack = []; 
      updateUI();
      sendToFirebase();
    } 
  }

  createTimelineCells(); loadDatabaseStructures(); updateUI();
</script>
</body>
</html>
